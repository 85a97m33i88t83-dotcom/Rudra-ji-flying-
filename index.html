<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Bird · Clone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
      padding: 10px;
    }
    .game-wrapper {
      background: linear-gradient(145deg, #1a1a3e, #2d2b55);
      border-radius: 32px;
      padding: 16px;
      box-shadow: 0 30px 40px rgba(0,0,0,0.8), inset 0 2px 0 rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.05);
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 400 / 600;
      background: linear-gradient(180deg, #4dc9f6 0%, #a8e6cf 100%);
      border-radius: 20px;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.2), inset 0 0 20px rgba(0,0,0,0.1);
      touch-action: none;
      cursor: pointer;
      image-rendering: auto;
    }
    @media (max-width: 480px) {
      .game-wrapper { padding: 8px; border-radius: 24px; }
    }
    @media (min-width: 768px) {
      .game-wrapper { padding: 20px; }
      canvas { max-width: 500px; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 400, H = 600;

    // ---------- GAME STATE ----------
    let state = 'LOADING';
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('flappyBest') || '0', 10);
    let gameSpeed = 2.8;
    let baseGap = 155;
    let frame = 0;
    let screenShake = 0;
    let flashAlpha = 0;
    let particles = [];
    let floatingScores = [];

    // Bird skin
    let currentSkin = 0;
    let selectedSkin = 0;

    // Bird - BIGGER for better visibility
    const bird = {
      x: 65, y: 280, w: 50, h: 38,
      vy: 0, gravity: 0.28, jumpPower: -5.5,
      rotation: 0
    };

    // Pipes
    let pipes = [];
    const PIPE_W = 58;
    const PIPE_HEIGHT = 340;
    const PIPE_SPAWN_INTERVAL = 95;
    let pipeCounter = 0;

    // Assets
    const assets = {
      images: {},
      sounds: {}
    };
    let assetsLoaded = 0;
    const totalAssets = 16;

    // UI
    let muted = false;
    let paused = false;
    let isGameOver = false;

    // ---------- ASSET LOADER ----------
    function loadAssets() {
      const imageMap = {
        background: 'assets/background.jpg',
        bird: 'assets/bird.png',
        bird1: 'assets/bird-1.png',
        bird2: 'assets/bird-2.png',
        bird3: 'assets/bird-3.png',
        bird4: 'assets/bird-4.png',
        bird5: 'assets/bird-5.png',
        bird6: 'assets/bird-6.png',
        bird7: 'assets/bird-7.png',
        bird8: 'assets/bird-8.png',
        bird9: 'assets/bird-9.png',
        bird10: 'assets/bird-10.png',
        pillarTop: 'assets/pillar-top.png',
        pillarBottom: 'assets/pillar-bottom.png',
        restart: 'assets/restart.png'
      };
      const soundMap = {
        bgm: 'assets/bgm.mp3',
        wing: 'assets/wing.mp3',
        score: 'assets/score.mp3',
        hit: 'assets/hit.mp3',
        gameover: 'assets/gameover.mp3'
      };

      let loaded = 0;
      function onLoad() {
        loaded++;
        assetsLoaded = loaded;
        if (loaded === totalAssets) {
          state = 'MENU';
          Object.values(assets.sounds).forEach(s => s && s.load && s.load());
        }
      }

      for (const [key, src] of Object.entries(imageMap)) {
        const img = new Image();
        img.onload = () => { assets.images[key] = img; onLoad(); };
        img.onerror = () => { console.warn('Failed to load', src); onLoad(); };
        img.src = src;
      }

      for (const [key, src] of Object.entries(soundMap)) {
        const audio = new Audio(src);
        audio.preload = 'auto';
        audio.oncanplaythrough = () => { onLoad(); };
        audio.onerror = () => { console.warn('Sound error', src); onLoad(); };
        assets.sounds[key] = audio;
      }
    }

    // ---------- AUDIO MANAGER ----------
    function playSound(key) {
      if (muted) return;
      const s = assets.sounds[key];
      if (!s) return;
      try {
        const clone = s.cloneNode();
        clone.volume = (key === 'bgm') ? 0.25 : 0.5;
        clone.play().catch(e => {});
        if (key === 'bgm') {
          clone.loop = true;
          if (window._bgmRef) window._bgmRef.pause();
          window._bgmRef = clone;
        }
      } catch (e) {}
    }

    function toggleMute() {
      muted = !muted;
      if (muted && window._bgmRef) {
        window._bgmRef.pause();
      } else if (!muted && state === 'PLAY') {
        playSound('bgm');
      }
    }

    // ---------- INPUT SYSTEM ----------
    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      let clientX, clientY;
      
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function isInRect(x, y, rx, ry, rw, rh) {
      return x >= rx && x <= rx + rw && y >= ry && y <= ry + rh;
    }

    function handleTap(e) {
      if (e) e.preventDefault();
      if (state === 'LOADING') return;
      
      const coords = getCanvasCoords(e);
      const x = coords.x;
      const y = coords.y;
      
      if (state === 'MENU') {
        // Customize button
        if (isInRect(x, y, 120, 230, 160, 60)) {
          state = 'CUSTOMIZE';
          selectedSkin = currentSkin;
          return;
        }
        // Play button
        if (isInRect(x, y, 120, 310, 160, 60)) {
          startGame();
          return;
        }
        return;
      }

      if (state === 'CUSTOMIZE') {
        // Done button
        if (isInRect(x, y, 120, 490, 160, 55)) {
          currentSkin = selectedSkin;
          state = 'MENU';
          return;
        }
        
        // Skin selection (grid)
        if (isInRect(x, y, 20, 100, 360, 380)) {
          const col = Math.floor((x - 25) / 72);
          const row = Math.floor((y - 105) / 72);
          const idx = row * 5 + col;
          if (idx >= 0 && idx <= 10) {
            selectedSkin = idx;
          }
        }
        return;
      }

      if (state === 'GAMEOVER') {
        restartGame();
        return;
      }
      
      if (state === 'PLAY' && !paused) {
        flapBird();
      }
    }

    // Event listeners
    canvas.addEventListener('click', handleTap);
    canvas.addEventListener('touchstart', handleTap, { passive: false });

    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
        if (state === 'MENU') {
          startGame();
        } else if (state === 'GAMEOVER') {
          restartGame();
        } else if (state === 'PLAY' && !paused) {
          flapBird();
        }
      }
      if (e.key === 'Enter' && state === 'GAMEOVER') {
        e.preventDefault();
        restartGame();
      }
      if (e.key === 'p' || e.key === 'P') {
        if (state === 'PLAY') paused = !paused;
      }
      if (e.key === 'm' || e.key === 'M') toggleMute();
      if (e.key === 'Escape' && state === 'CUSTOMIZE') {
        state = 'MENU';
      }
    });

    // ---------- PHYSICS ----------
    function flapBird() {
      bird.vy = bird.jumpPower;
      bird.rotation = -25 * Math.PI / 180;
      playSound('wing');
    }

    function updateBird() {
      if (paused || state !== 'PLAY') return;
      bird.vy += bird.gravity;
      bird.y += bird.vy;

      if (bird.vy < -0.5) {
        bird.rotation += (-25 * Math.PI/180 - bird.rotation) * 0.12;
      } else {
        bird.rotation += (70 * Math.PI/180 - bird.rotation) * 0.06;
      }
      if (bird.y < -10) bird.y = -10;
      if (bird.y + bird.h > H - 10) {
        bird.y = H - 10 - bird.h;
        if (state === 'PLAY') gameOver();
      }
    }

    // ---------- PIPES ----------
    function spawnPipe() {
      const minY = 80;
      const maxY = H - 80 - baseGap;
      const topHeight = Math.floor(Math.random() * (maxY - minY + 1)) + minY;
      pipes.push({
        x: W + 20,
        topHeight: topHeight,
        scored: false
      });
    }

    function updatePipes() {
      if (paused || state !== 'PLAY') return;
      pipeCounter++;
      if (pipeCounter >= PIPE_SPAWN_INTERVAL) {
        pipeCounter = 0;
        spawnPipe();
      }

      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= gameSpeed;

        if (!p.scored && p.x + PIPE_W < bird.x) {
          p.scored = true;
          score++;
          playSound('score');
          floatingScores.push({ x: bird.x + 20, y: bird.y - 10, life: 40 });
          if (score % 10 === 0) {
            gameSpeed = Math.min(gameSpeed + 0.2, 5.5);
            baseGap = Math.max(baseGap - 4, 110);
          }
        }

        const birdBox = {
          x: bird.x + 6, y: bird.y + 6,
          w: bird.w - 12, h: bird.h - 12
        };
        const topBox = { x: p.x, y: 0, w: PIPE_W, h: p.topHeight };
        const bottomBox = { x: p.x, y: p.topHeight + baseGap, w: PIPE_W, h: H - p.topHeight - baseGap };

        if (boxCollide(birdBox, topBox) || boxCollide(birdBox, bottomBox)) {
          gameOver();
          return;
        }

        if (p.x + PIPE_W < -20) {
          pipes.splice(i, 1);
        }
      }
    }

    function boxCollide(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x &&
             a.y < b.y + b.h && a.y + a.h > b.y;
    }

    // ---------- PARTICLES ----------
    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = floatingScores.length - 1; i >= 0; i--) {
        const f = floatingScores[i];
        f.y -= 0.7;
        f.life--;
        if (f.life <= 0) floatingScores.splice(i, 1);
      }
    }

    // ---------- GAME STATE ----------
    function startGame() {
      state = 'PLAY';
      paused = false;
      score = 0;
      gameSpeed = 2.8;
      baseGap = 155;
      bird.y = 280;
      bird.vy = 0;
      bird.rotation = 0;
      pipes = [];
      particles = [];
      floatingScores = [];
      pipeCounter = 0;
      screenShake = 0;
      flashAlpha = 0;
      if (!muted) playSound('bgm');
    }

    function gameOver() {
      if (state === 'GAMEOVER') return;
      state = 'GAMEOVER';
      isGameOver = true;
      playSound('hit');
      setTimeout(() => playSound('gameover'), 120);
      screenShake = 12;
      flashAlpha = 0.6;
      if (window._bgmRef) { window._bgmRef.pause(); window._bgmRef = null; }
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('flappyBest', String(bestScore));
      }
    }

    function restartGame() {
      state = 'PLAY';
      isGameOver = false;
      score = 0;
      gameSpeed = 2.8;
      baseGap = 155;
      bird.y = 280;
      bird.vy = 0;
      bird.rotation = 0;
      pipes = [];
      particles = [];
      floatingScores = [];
      pipeCounter = 0;
      screenShake = 0;
      flashAlpha = 0;
      if (!muted) playSound('bgm');
    }

    // ---------- RENDER ----------
    function getBirdImage() {
      if (currentSkin === 0) return assets.images.bird;
      const key = 'bird' + currentSkin;
      return assets.images[key] || assets.images.bird;
    }

    function drawBackground() {
      const bg = assets.images.background;
      if (bg) {
        ctx.drawImage(bg, 0, 0, W, H);
      } else {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#4dc9f6');
        grad.addColorStop(0.6, '#a8e6cf');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawPipes() {
      const topImg = assets.images.pillarTop;
      const bottomImg = assets.images.pillarBottom;
      
      for (const p of pipes) {
        // Top pipe - draw full image
        if (topImg) {
          // Draw top pipe with proper sizing - image stretches to fit
          ctx.drawImage(topImg, p.x, p.topHeight - PIPE_HEIGHT, PIPE_W, PIPE_HEIGHT);
        } else {
          ctx.fillStyle = '#2d7d2d';
          ctx.fillRect(p.x, 0, PIPE_W, p.topHeight);
          ctx.fillStyle = '#3a9a3a';
          ctx.fillRect(p.x-8, p.topHeight-40, PIPE_W+16, 40);
        }
        
        // Bottom pipe - draw full image
        if (bottomImg) {
          ctx.drawImage(bottomImg, p.x, p.topHeight + baseGap, PIPE_W, PIPE_HEIGHT);
        } else {
          ctx.fillStyle = '#2d7d2d';
          ctx.fillRect(p.x, p.topHeight + baseGap, PIPE_W, H - p.topHeight - baseGap);
          ctx.fillStyle = '#3a9a3a';
          ctx.fillRect(p.x-8, p.topHeight + baseGap, PIPE_W+16, 40);
        }
      }
    }

    function drawBird() {
      const bImg = getBirdImage();
      if (bImg) {
        ctx.save();
        ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
        ctx.rotate(bird.rotation);
        // Draw with shadow for depth
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 2;
        ctx.drawImage(bImg, -bird.w/2, -bird.h/2, bird.w, bird.h);
        ctx.restore();
      } else {
        ctx.save();
        ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
        ctx.rotate(bird.rotation);
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(-bird.w/2, -bird.h/2, bird.w, bird.h);
        ctx.restore();
      }
    }

    function drawUI() {
      // Score panel with glass effect
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = 10;
      
      // Score background
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.roundRect(10, 10, 120, 40, 12);
      ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.roundRect(W - 130, 10, 120, 40, 12);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('🕊️ ' + score, 22, 38);
      ctx.textAlign = 'right';
      ctx.fillText('🏆 ' + bestScore, W - 22, 38);

      // Mute button
      ctx.shadowBlur = 0;
      ctx.font = '26px sans-serif';
      ctx.fillStyle = muted ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.9)';
      ctx.textAlign = 'left';
      ctx.fillText(muted ? '🔇' : '🔊', W - 44, 48);
    }

    function drawMenu() {
      // Dark overlay with blur effect
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 20;
      
      // Title with gradient
      const grad = ctx.createLinearGradient(0, 60, 0, 160);
      grad.addColorStop(0, '#FFD700');
      grad.addColorStop(0.5, '#FFA500');
      grad.addColorStop(1, '#FF6B6B');
      ctx.fillStyle = grad;
      ctx.font = 'bold 56px system-ui, sans-serif';
      ctx.fillText('🐦 FLAPPY', W/2, 130);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px system-ui';
      ctx.shadowBlur = 10;
      ctx.fillText('BIRD', W/2, 175);

      // Buttons with modern design
      ctx.shadowBlur = 15;
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      
      // Customize button
      const cx = 120, cy1 = 230;
      ctx.fillStyle = 'rgba(33, 150, 243, 0.9)';
      ctx.beginPath();
      ctx.roundRect(cx, cy1, 160, 60, 16);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.font = 'bold 24px system-ui';
      ctx.shadowBlur = 0;
      ctx.fillText('🎨 CUSTOMIZE', W/2, cy1 + 40);

      // Play button
      const cy2 = 310;
      ctx.shadowBlur = 15;
      ctx.fillStyle = 'rgba(76, 175, 80, 0.95)';
      ctx.beginPath();
      ctx.roundRect(cx, cy2, 160, 60, 16);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.font = 'bold 28px system-ui';
      ctx.shadowBlur = 0;
      ctx.fillText('▶ PLAY', W/2, cy2 + 40);

      // Best score
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '18px system-ui';
      ctx.fillText('Best Score: ' + bestScore, W/2, 430);
      
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '14px system-ui';
      ctx.fillText('Tap or press Space', W/2, 470);

      // Current bird preview
      const bImg = getBirdImage();
      if (bImg) {
        ctx.shadowBlur = 20;
        ctx.shadowColor = 'rgba(255,215,0,0.3)';
        ctx.drawImage(bImg, W/2-28, 490, 56, 42);
        ctx.shadowBlur = 0;
      }
    }

    function drawCustomize() {
      // Dark background with gradient
      const grad = ctx.createRadialGradient(200, 300, 50, 200, 300, 350);
      grad.addColorStop(0, 'rgba(30,30,80,0.95)');
      grad.addColorStop(1, 'rgba(10,10,30,0.98)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(255,215,0,0.2)';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 26px system-ui';
      ctx.fillText('🎨 Choose Your Bird', W/2, 45);
      
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '15px system-ui';
      ctx.fillText('Tap to select, then DONE', W/2, 72);

      // Skin grid - 5 columns
      const cols = 5;
      const size = 58;
      const gap = 10;
      const startX = 25;
      const startY = 100;
      const totalRows = Math.ceil(11 / cols);

      for (let i = 0; i <= 10; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const x = startX + col * (size + gap);
        const y = startY + row * (size + gap + 8);
        
        const isSelected = (i === selectedSkin);
        
        // Card background
        ctx.shadowBlur = isSelected ? 25 : 5;
        ctx.shadowColor = isSelected ? 'rgba(76, 175, 80, 0.8)' : 'rgba(0,0,0,0.5)';
        ctx.fillStyle = isSelected ? 'rgba(76, 175, 80, 0.3)' : 'rgba(255,255,255,0.08)';
        ctx.beginPath();
        ctx.roundRect(x, y, size, size, 10);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.strokeStyle = isSelected ? '#4CAF50' : 'rgba(255,255,255,0.15)';
        ctx.lineWidth = isSelected ? 3 : 1;
        ctx.beginPath();
        ctx.roundRect(x, y, size, size, 10);
        ctx.stroke();

        // Bird image
        let img;
        if (i === 0) img = assets.images.bird;
        else img = assets.images['bird' + i];
        if (img && img.complete && img.naturalWidth > 0) {
          ctx.shadowBlur = 0;
          ctx.drawImage(img, x + 6, y + 6, size - 12, size - 12);
        } else {
          ctx.fillStyle = '#FFD700';
          ctx.font = '30px sans-serif';
          ctx.fillText('🐦', x + 15, y + 42);
        }
        
        // Selection indicator
        if (isSelected) {
          ctx.fillStyle = '#4CAF50';
          ctx.font = '18px sans-serif';
          ctx.fillText('✓', x + size - 18, y + 20);
        }
      }

      // Done button
      ctx.shadowBlur = 15;
      ctx.shadowColor = 'rgba(76, 175, 80, 0.4)';
      ctx.fillStyle = '#4CAF50';
      ctx.beginPath();
      ctx.roundRect(120, 490, 160, 55, 16);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'white';
      ctx.font = 'bold 24px system-ui';
      ctx.fillText('✅ DONE', W/2, 526);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(255,0,0,0.3)';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#ff4757';
      ctx.font = 'bold 48px system-ui';
      ctx.fillText('💀 GAME OVER', W/2, 150);

      ctx.shadowBlur = 10;
      ctx.fillStyle = 'white';
      ctx.font = '28px system-ui';
      ctx.fillText('Score: ' + score, W/2, 240);
      ctx.fillStyle = '#FFD700';
      ctx.fillText('Best: ' + bestScore, W/2, 290);

      // Restart button
      const rImg = assets.images.restart;
      if (rImg) {
        ctx.shadowBlur = 20;
        ctx.shadowColor = 'rgba(255,215,0,0.3)';
        ctx.drawImage(rImg, W/2-35, 340, 70, 70);
      } else {
        ctx.fillStyle = '#ffcc00';
        ctx.font = '50px sans-serif';
        ctx.fillText('↻', W/2, 400);
      }
      
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '16px system-ui';
      ctx.fillText('tap or Enter to restart', W/2, 460);
    }

    function render() {
      ctx.save();
      if (screenShake > 0) {
        const shake = Math.random() * screenShake * 1.2;
        ctx.translate(shake * (Math.random()>0.5?1:-1), shake * (Math.random()>0.5?1:-1));
        screenShake *= 0.9;
        if (screenShake < 0.2) screenShake = 0;
      }

      drawBackground();
      
      if (state === 'PLAY' || state === 'GAMEOVER') {
        drawPipes();
        drawBird();
        
        // Particles
        for (const p of particles) {
          ctx.globalAlpha = p.life / 40;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        
        // Floating scores
        for (const f of floatingScores) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 24px system-ui';
          ctx.globalAlpha = f.life / 40;
          ctx.shadowColor = 'rgba(0,0,0,0.5)';
          ctx.shadowBlur = 10;
          ctx.fillText('+1', f.x, f.y);
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
        
        drawUI();

        // Flash
        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
          flashAlpha *= 0.88;
        }

        // Pause overlay
        if (paused && state === 'PLAY') {
          ctx.fillStyle = 'rgba(0,0,0,0.4)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = 'white';
          ctx.font = 'bold 36px system-ui';
          ctx.textAlign = 'center';
          ctx.shadowColor = 'rgba(0,0,0,0.5)';
          ctx.shadowBlur = 20;
          ctx.fillText('⏸ PAUSED', W/2, H/2);
          ctx.shadowBlur = 0;
        }
      }

      if (state === 'MENU') drawMenu();
      if (state === 'CUSTOMIZE') drawCustomize();
      if (state === 'GAMEOVER') drawGameOver();

      ctx.restore();
    }

    // ---------- GAME LOOP ----------
    function update() {
      if (state === 'PLAY' && !paused) {
        updateBird();
        updatePipes();
        updateParticles();
      } else if (state === 'MENU') {
        bird.y += Math.sin(frame * 0.05) * 0.3;
      }
      frame++;
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    // ---------- POLYFILL for roundRect ----------
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (r > w/2) r = w/2;
        if (r > h/2) r = h/2;
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        return this;
      };
    }

    // ---------- START ----------
    loadAssets();

    setTimeout(() => {
      if (state === 'LOADING') {
        state = 'MENU';
        console.warn('Assets timeout, starting anyway');
      }
    }, 6000);

    gameLoop();

    window.toggleMute = toggleMute;
  })();
</script>
