<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Bird · Clone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      touch-action: manipulation;
    }
    .game-wrapper {
      background: #16213e;
      border-radius: 28px;
      padding: 12px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.7);
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 400 / 600;
      background: #70c5ce;
      border-radius: 20px;
      box-shadow: inset 0 0 0 2px #3e6b7a;
      touch-action: none;
      cursor: pointer;
      image-rendering: crisp-edges;
    }
    @media (max-width: 480px) {
      .game-wrapper { padding: 6px; border-radius: 18px; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="gameCanvas" width="400" height="600" aria-label="Flappy Bird game"></canvas>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 400, H = 600;

    // ---------- GAME STATE ----------
    let state = 'LOADING'; // LOADING, MENU, PLAY, GAMEOVER, CUSTOMIZE
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('flappyBest') || '0', 10);
    let gameSpeed = 2.6;
    let baseGap = 150;
    let frame = 0;
    let screenShake = 0;
    let flashAlpha = 0;
    let particles = [];
    let floatingScores = [];

    // Bird skin
    let currentSkin = 0;
    let selectedSkin = 0;

    // Bird
    const bird = {
      x: 70, y: 280, w: 44, h: 34,
      vy: 0, gravity: 0.25, jumpPower: -5.2,
      rotation: 0
    };

    // Pipes
    let pipes = [];
    const PIPE_W = 52;
    const PIPE_SPAWN_INTERVAL = 100;
    let pipeCounter = 0;

    // Assets
    const assets = {
      images: {},
      sounds: {}
    };
    let assetsLoaded = 0;
    const totalAssets = 16;

    // UI
    let muted = false;
    let paused = false;
    let isGameOver = false;

    // ---------- ASSET LOADER ----------
    function loadAssets() {
      const imageMap = {
        background: 'assets/background.jpg',
        bird: 'assets/bird.png',
        bird1: 'assets/bird-1.png',
        bird2: 'assets/bird-2.png',
        bird3: 'assets/bird-3.png',
        bird4: 'assets/bird-4.png',
        bird5: 'assets/bird-5.png',
        bird6: 'assets/bird-6.png',
        bird7: 'assets/bird-7.png',
        bird8: 'assets/bird-8.png',
        bird9: 'assets/bird-9.png',
        bird10: 'assets/bird-10.png',
        pillarTop: 'assets/pillar-top.png',
        pillarBottom: 'assets/pillar-bottom.png',
        restart: 'assets/restart.png'
      };
      const soundMap = {
        bgm: 'assets/bgm.mp3',
        wing: 'assets/wing.mp3',
        score: 'assets/score.mp3',
        hit: 'assets/hit.mp3',
        gameover: 'assets/gameover.mp3'
      };

      let loaded = 0;
      function onLoad() {
        loaded++;
        assetsLoaded = loaded;
        if (loaded === totalAssets) {
          state = 'MENU';
          Object.values(assets.sounds).forEach(s => s && s.load && s.load());
        }
      }

      for (const [key, src] of Object.entries(imageMap)) {
        const img = new Image();
        img.onload = () => { assets.images[key] = img; onLoad(); };
        img.onerror = () => { console.warn('Failed to load', src); onLoad(); };
        img.src = src;
      }

      for (const [key, src] of Object.entries(soundMap)) {
        const audio = new Audio(src);
        audio.preload = 'auto';
        audio.oncanplaythrough = () => { onLoad(); };
        audio.onerror = () => { console.warn('Sound error', src); onLoad(); };
        assets.sounds[key] = audio;
      }
    }

    // ---------- AUDIO MANAGER ----------
    function playSound(key) {
      if (muted) return;
      const s = assets.sounds[key];
      if (!s) return;
      try {
        const clone = s.cloneNode();
        clone.volume = (key === 'bgm') ? 0.3 : 0.6;
        clone.play().catch(e => {});
        if (key === 'bgm') {
          clone.loop = true;
          if (window._bgmRef) window._bgmRef.pause();
          window._bgmRef = clone;
        }
      } catch (e) {}
    }

    function toggleMute() {
      muted = !muted;
      if (muted && window._bgmRef) {
        window._bgmRef.pause();
      } else if (!muted && state === 'PLAY') {
        playSound('bgm');
      }
    }

    // ---------- INPUT SYSTEM ----------
    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      let clientX, clientY;
      
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function handleTap(e) {
      if (e) e.preventDefault();
      if (state === 'LOADING') return;
      
      const coords = getCanvasCoords(e);
      const x = coords.x;
      const y = coords.y;
      
      if (state === 'MENU') {
        // Customize button
        if (x > 140 && x < 260 && y > 250 && y < 310) {
          state = 'CUSTOMIZE';
          selectedSkin = currentSkin;
          return;
        }
        // Play button
        if (x > 140 && x < 260 && y > 330 && y < 390) {
          startGame();
          return;
        }
        return;
      }

      if (state === 'CUSTOMIZE') {
        // Done button
        if (x > 140 && x < 260 && y > 500 && y < 560) {
          currentSkin = selectedSkin;
          state = 'MENU';
          return;
        }
        
        // Skin selection (grid)
        if (x > 20 && x < 380 && y > 100 && y < 480) {
          const col = Math.floor((x - 30) / 75);
          const row = Math.floor((y - 120) / 75);
          const idx = row * 4 + col;
          if (idx >= 0 && idx <= 10) {
            selectedSkin = idx;
          }
        }
        return;
      }

      if (state === 'GAMEOVER') {
        restartGame();
        return;
      }
      
      if (state === 'PLAY' && !paused) {
        flapBird();
      }
    }

    // Event listeners
    canvas.addEventListener('click', handleTap);
    canvas.addEventListener('touchstart', handleTap, { passive: false });

    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
        if (state === 'MENU') {
          startGame();
        } else if (state === 'GAMEOVER') {
          restartGame();
        } else if (state === 'PLAY' && !paused) {
          flapBird();
        }
      }
      if (e.key === 'Enter' && state === 'GAMEOVER') {
        e.preventDefault();
        restartGame();
      }
      if (e.key === 'p' || e.key === 'P') {
        if (state === 'PLAY') paused = !paused;
      }
      if (e.key === 'm' || e.key === 'M') toggleMute();
      if (e.key === 'Escape' && state === 'CUSTOMIZE') {
        state = 'MENU';
      }
    });

    // ---------- PHYSICS ----------
    function flapBird() {
      bird.vy = bird.jumpPower;
      bird.rotation = -25 * Math.PI / 180;
      playSound('wing');
    }

    function updateBird() {
      if (paused || state !== 'PLAY') return;
      bird.vy += bird.gravity;
      bird.y += bird.vy;

      if (bird.vy < -0.5) {
        bird.rotation += (-25 * Math.PI/180 - bird.rotation) * 0.12;
      } else {
        bird.rotation += (70 * Math.PI/180 - bird.rotation) * 0.06;
      }
      if (bird.y < -10) bird.y = -10;
      if (bird.y + bird.h > H - 10) {
        bird.y = H - 10 - bird.h;
        if (state === 'PLAY') gameOver();
      }
    }

    // ---------- PIPES ----------
    function spawnPipe() {
      const minY = 60;
      const maxY = H - 60 - baseGap;
      const topHeight = Math.floor(Math.random() * (maxY - minY + 1)) + minY;
      pipes.push({
        x: W + 20,
        topHeight: topHeight,
        scored: false
      });
    }

    function updatePipes() {
      if (paused || state !== 'PLAY') return;
      pipeCounter++;
      if (pipeCounter >= PIPE_SPAWN_INTERVAL) {
        pipeCounter = 0;
        spawnPipe();
      }

      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= gameSpeed;

        if (!p.scored && p.x + PIPE_W < bird.x) {
          p.scored = true;
          score++;
          playSound('score');
          floatingScores.push({ x: bird.x + 20, y: bird.y - 10, life: 40 });
          if (score % 10 === 0) {
            gameSpeed = Math.min(gameSpeed + 0.2, 5.5);
            baseGap = Math.max(baseGap - 4, 110);
          }
        }

        const birdBox = {
          x: bird.x + 6, y: bird.y + 6,
          w: bird.w - 12, h: bird.h - 12
        };
        const topBox = { x: p.x, y: 0, w: PIPE_W, h: p.topHeight };
        const bottomBox = { x: p.x, y: p.topHeight + baseGap, w: PIPE_W, h: H - p.topHeight - baseGap };

        if (boxCollide(birdBox, topBox) || boxCollide(birdBox, bottomBox)) {
          gameOver();
          return;
        }

        if (p.x + PIPE_W < -20) {
          pipes.splice(i, 1);
        }
      }
    }

    function boxCollide(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x &&
             a.y < b.y + b.h && a.y + a.h > b.y;
    }

    // ---------- PARTICLES ----------
    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = floatingScores.length - 1; i >= 0; i--) {
        const f = floatingScores[i];
        f.y -= 0.7;
        f.life--;
        if (f.life <= 0) floatingScores.splice(i, 1);
      }
    }

    // ---------- GAME STATE ----------
    function startGame() {
      state = 'PLAY';
      paused = false;
      score = 0;
      gameSpeed = 2.6;
      baseGap = 150;
      bird.y = 280;
      bird.vy = 0;
      bird.rotation = 0;
      pipes = [];
      particles = [];
      floatingScores = [];
      pipeCounter = 0;
      screenShake = 0;
      flashAlpha = 0;
      if (!muted) playSound('bgm');
    }

    function gameOver() {
      if (state === 'GAMEOVER') return;
      state = 'GAMEOVER';
      isGameOver = true;
      playSound('hit');
      setTimeout(() => playSound('gameover'), 120);
      screenShake = 12;
      flashAlpha = 0.6;
      if (window._bgmRef) { window._bgmRef.pause(); window._bgmRef = null; }
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('flappyBest', String(bestScore));
      }
    }

    function restartGame() {
      state = 'PLAY';
      isGameOver = false;
      score = 0;
      gameSpeed = 2.6;
      baseGap = 150;
      bird.y = 280;
      bird.vy = 0;
      bird.rotation = 0;
      pipes = [];
      particles = [];
      floatingScores = [];
      pipeCounter = 0;
      screenShake = 0;
      flashAlpha = 0;
      if (!muted) playSound('bgm');
    }

    // ---------- RENDER ----------
    function getBirdImage() {
      if (currentSkin === 0) return assets.images.bird;
      const key = 'bird' + currentSkin;
      return assets.images[key] || assets.images.bird;
    }

    function drawBackground() {
      const bg = assets.images.background;
      if (bg) {
        ctx.drawImage(bg, 0, 0, W, H);
      } else {
        ctx.fillStyle = '#70c5ce';
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawPipes() {
      const topImg = assets.images.pillarTop;
      const bottomImg = assets.images.pillarBottom;
      for (const p of pipes) {
        if (topImg) {
          ctx.drawImage(topImg, p.x, p.topHeight - 320, PIPE_W, 320);
        } else {
          ctx.fillStyle = '#228B22';
          ctx.fillRect(p.x, 0, PIPE_W, p.topHeight);
          ctx.fillStyle = '#2E7D32';
          ctx.fillRect(p.x-6, p.topHeight-30, PIPE_W+12, 30);
        }
        if (bottomImg) {
          ctx.drawImage(bottomImg, p.x, p.topHeight + baseGap, PIPE_W, 320);
        } else {
          ctx.fillStyle = '#228B22';
          ctx.fillRect(p.x, p.topHeight + baseGap, PIPE_W, H - p.topHeight - baseGap);
          ctx.fillStyle = '#2E7D32';
          ctx.fillRect(p.x-6, p.topHeight + baseGap, PIPE_W+12, 30);
        }
      }
    }

    function drawBird() {
      const bImg = getBirdImage();
      if (bImg) {
        ctx.save();
        ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
        ctx.rotate(bird.rotation);
        ctx.drawImage(bImg, -bird.w/2, -bird.h/2, bird.w, bird.h);
        ctx.restore();
      } else {
        ctx.save();
        ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
        ctx.rotate(bird.rotation);
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(-bird.w/2, -bird.h/2, bird.w, bird.h);
        ctx.restore();
      }
    }

    function drawUI() {
      ctx.fillStyle = 'white';
      ctx.font = 'bold 22px system-ui, sans-serif';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 8;
      ctx.fillText('🕊️ ' + score, 20, 50);
      ctx.fillText('🏆 ' + bestScore, W - 110, 50);
      ctx.shadowBlur = 0;

      ctx.font = '28px sans-serif';
      ctx.fillStyle = muted ? '#aaa' : 'white';
      ctx.fillText(muted ? '🔇' : '🔊', W - 48, 48);
    }

    function drawMenu() {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.textAlign = 'center';
      ctx.shadowColor = 'black';
      ctx.shadowBlur = 16;
      
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 52px system-ui, sans-serif';
      ctx.fillText('🐦 FLAPPY', W/2, 140);
      ctx.fillStyle = 'white';
      ctx.font = '24px system-ui';
      ctx.fillText('BIRD', W/2, 185);

      ctx.shadowBlur = 8;
      
      // Customize button
      ctx.fillStyle = '#2196F3';
      ctx.fillRect(140, 250, 120, 60);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 24px system-ui';
      ctx.fillText('🎨 CUSTOM', W/2, 292);

      // Play button
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(140, 330, 120, 60);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 28px system-ui';
      ctx.fillText('▶ PLAY', W/2, 372);

      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ddd';
      ctx.font = '20px system-ui';
      ctx.fillText('Best: ' + bestScore, W/2, 460);
      ctx.fillStyle = '#aaa';
      ctx.font = '16px system-ui';
      ctx.fillText('Tap or press Space', W/2, 520);

      const bImg = getBirdImage();
      if (bImg) {
        ctx.drawImage(bImg, W/2-22, 560, 44, 34);
      }
    }

    function drawCustomize() {
      ctx.fillStyle = 'rgba(0,0,0,0.88)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.textAlign = 'center';
      ctx.fillStyle = 'white';
      ctx.font = 'bold 28px system-ui';
      ctx.fillText('🎨 Choose Bird Skin', W/2, 55);
      
      ctx.fillStyle = '#888';
      ctx.font = '16px system-ui';
      ctx.fillText('Tap a bird to select, then tap DONE', W/2, 85);

      const cols = 4;
      const size = 60;
      const gap = 12;
      const startX = 30;
      const startY = 120;

      for (let i = 0; i <= 10; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const x = startX + col * (size + gap);
        const y = startY + row * (size + gap + 12);
        
        const isSelected = (i === selectedSkin);
        ctx.fillStyle = isSelected ? '#4CAF50' : '#333';
        ctx.shadowBlur = isSelected ? 20 : 0;
        ctx.shadowColor = '#4CAF50';
        ctx.fillRect(x, y, size, size);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = isSelected ? '#FFD700' : '#555';
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, size, size);

        let img;
        if (i === 0) img = assets.images.bird;
        else img = assets.images['bird' + i];
        if (img && img.complete && img.naturalWidth > 0) {
          ctx.drawImage(img, x + 8, y + 8, size - 16, size - 16);
        } else {
          ctx.fillStyle = '#FFD700';
          ctx.font = '30px sans-serif';
          ctx.fillText('🐦', x + 15, y + 45);
        }
        
        ctx.fillStyle = '#ccc';
        ctx.font = '11px system-ui';
        ctx.fillText('#' + i, x + size/2, y + size + 16);
      }

      ctx.shadowBlur = 0;
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(140, 500, 120, 50);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 24px system-ui';
      ctx.fillText('✅ DONE', W/2, 536);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';
      ctx.shadowColor = 'black';
      ctx.shadowBlur = 16;
      ctx.fillStyle = '#ff4d4d';
      ctx.font = 'bold 44px system-ui';
      ctx.fillText('💀 GAME OVER', W/2, 170);

      ctx.fillStyle = 'white';
      ctx.font = '28px system-ui';
      ctx.fillText('Score: ' + score, W/2, 260);
      ctx.fillText('Best: ' + bestScore, W/2, 310);

      const rImg = assets.images.restart;
      if (rImg) {
        ctx.drawImage(rImg, W/2-32, 360, 64, 64);
      } else {
        ctx.fillStyle = '#ffcc00';
        ctx.font = '40px sans-serif';
        ctx.fillText('↻', W/2, 410);
      }
      ctx.shadowBlur = 0;
      ctx.font = '18px system-ui';
      ctx.fillStyle = '#ddd';
      ctx.fillText('tap or Enter to restart', W/2, 480);
    }

    function render() {
      ctx.save();
      if (screenShake > 0) {
        const shake = Math.random() * screenShake * 1.2;
        ctx.translate(shake * (Math.random()>0.5?1:-1), shake * (Math.random()>0.5?1:-1));
        screenShake *= 0.9;
        if (screenShake < 0.2) screenShake = 0;
      }

      drawBackground();
      
      if (state === 'PLAY' || state === 'GAMEOVER') {
        drawPipes();
        drawBird();
        
        for (const p of particles) {
          ctx.globalAlpha = p.life / 40;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        for (const f of floatingScores) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 22px system-ui';
          ctx.globalAlpha = f.life / 40;
          ctx.fillText('+1', f.x, f.y);
        }
        ctx.globalAlpha = 1;
        drawUI();

        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
          flashAlpha *= 0.88;
        }

        if (paused && state === 'PLAY') {
          ctx.fillStyle = 'rgba(0,0,0,0.3)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = 'white';
          ctx.font = '34px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText('⏸ PAUSED', W/2, H/2);
        }
      }

      if (state === 'MENU') drawMenu();
      if (state === 'CUSTOMIZE') drawCustomize();
      if (state === 'GAMEOVER') drawGameOver();

      ctx.restore();
    }

    // ---------- GAME LOOP ----------
    function update() {
      if (state === 'PLAY' && !paused) {
        updateBird();
        updatePipes();
        updateParticles();
      } else if (state === 'MENU') {
        bird.y += Math.sin(frame * 0.05) * 0.3;
      }
      frame++;
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    // ---------- START ----------
    loadAssets();

    setTimeout(() => {
      if (state === 'LOADING') {
        state = 'MENU';
        console.warn('Assets timeout, starting anyway');
      }
    }, 6000);

    gameLoop();

    window.toggleMute = toggleMute;
  })();
</script>
</body>
</html>
